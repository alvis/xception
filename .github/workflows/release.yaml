name: release

on:
  push:
    tags:
      - v*
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: install pnpm
        uses: pnpm/action-setup@v6
      - name: use node lts
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          registry-url: https://registry.npmjs.org
      - name: install dependencies
        run: pnpm install
      - name: publish GitHub release
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "GitHub release $GITHUB_REF_NAME already exists"
          else
            release_notes_file="$RUNNER_TEMP/release-notes.md"
            npx run release:notes -- --output "$release_notes_file"
            gh release create "$GITHUB_REF_NAME" --verify-tag --notes-file "$release_notes_file"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: release to npm
        run: pnpm publish --access public --provenance --no-git-checks
