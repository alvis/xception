name: code coverage

on:
  push:
    branches:
      - '**'
jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: enable corepack
        run: corepack enable
      - name: use node LTS
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
      - name: install dependencies
        run: pnpm install
      - name: run coverage
        run: pnpm run coverage
        env:
          CI: true
