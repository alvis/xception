name: compliance

on:
  push:
    branches:
      - "**"
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
permissions:
  contents: read
jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [22, 23, 24, 26]
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: install pnpm
        uses: pnpm/action-setup@v6
      - name: use node ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - name: install dependencies
        run: pnpm install
      - name: run lint
        run: pnpm run lint
      - name: run test
        run: pnpm test:coverage
      - name: run build
        run: pnpm run build
